# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

bind = $mainMod CTRL, C , exec, ghostty -e bash -c  "cd ~/.config/hypr/ && nvim ~/.config/hypr/hyprland.conf"
bind = $mainMod CTRL, R , exec, hyprctl reload 
bind = $mainMod SHIFT, W , exec, ~/.config/hypr/scripts/wallpaper.sh
bind = $mainMod SHIFT, T , exec, ~/.config/theme-switcher/theme-switcher.sh random
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, exec, cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy 
bind = $mainMod, Q, killactive, 
bind = $mainMod ALT, E, exec , kitty --class yazi -e yazi
bind = $mainMod, M, exec, kitty --class btop -e btop
bind = $mainMod SHIFT, M, exit 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, Space, exec, $menu
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, togglesplit, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, wlogout -p layer-shell
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/toggle-waybar.sh
bind = $mainMod, backslash, exec, "${HOME}/.config/hypr/scripts/layout.sh"
bind = $mainMod SHIFT, backslash, exec, "${HOME}/.config/hypr/scripts/layout2.sh"
bind = $mainMod, period, exec, wofi-emoji

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + hjkl 
bind = $mainMod, H, movefocus, l
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, L, movefocus, r




# Print Screen: Interactive screenshot (select a region) and save to Pictures
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && dunstify "Screenshot" "Screenshot saved!" -a "grim" -t 3000

# Super + Shift + S: Interactive screenshot straight to Clipboard (no saving)
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Super + S: Capture full screen and save to Pictures
bind = $mainMod ALT, S, exec, grim ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && dunstify "Screenshot" "Screenshot saved!" -a "grim" -t 3000


# toggle no border, no gaps, no border radius
bind = $mainMod SHIFT CTRL, B, exec, ~/.config/hypr/scripts/toggle-compact.sh


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle




# Laptop multimedia keys (replace with your standard volume/brightness keys if preferred)
bindle = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindle = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down



# Zoom directly into 1.6x magnification
bind = SUPER, Z, exec, hyprctl keyword cursor:zoom_factor 1.6

# Reset zoom back to normal (1.0)
bind = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1.0



# =============================================================================
# INTERACTIVE HELP CHEATSHEET
# =============================================================================
# Run the help script inside a specific kitty session class
bind = $mainMod , H, exec, kitty --class hypr_help -e ~/.config/hypr/scripts/help.sh




bind = $mainMod, B, exec , brave 
###web gapps
# Launch WhatsApp Web App
bind = $mainMod ALT, W, exec, brave --app=https://web.whatsapp.com

# Launch Gemini AI Web App
bind = $mainMod ALT, g, exec, brave --app=https://gemini.google.com

# Notification history
bind = $mainMod, N, exec, kitty --class notifications -e ~/.config/hypr/scripts/notifications.sh

###Quick settings 
bind = $mainMod, S , exec, kitty --class quick-settings -e  ~/.config/hypr/scripts/quick-settings.sh
